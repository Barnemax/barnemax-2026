# Project: Specific Fields (auto-generated by acf-json-to-graphql)
fragment ProjectFieldsFields on Project {
  projectFields {
    year
    siteUrl
    githubUrl
    designer {
      target
      title
      url
    }
    collaboration {
      target
      title
      url
    }
    projectScreenshots {
      ... on ProjectFieldsProjectScreenshotsProjectScreenLayout {
        projectImage {
          node {
            altText
            mediaDetails {
              height
              sizes {
                height
                name
                sourceUrl
                width
              }
              width
            }
            sourceUrl
          }
        }
        imageTitle
      }
    }
  }
}

# Homepage (auto-generated by acf-json-to-graphql)
fragment HomepageFields on Page {
  homepage {
    summary {
      ... on HomepageSummaryColumnLayout {
        columnTitle
        summaryItem {
          ... on HomepageSummarySummaryItemSummaryItemLayout {
            label
            value
          }
        }
        links {
          ... on HomepageSummaryLinksLinkLayoutLayout {
            link {
              target
              title
              url
            }
          }
        }
      }
    }
    homeProjects {
      titleProjects
      highlightedProjects {
        nodes {
          id
          slug
          ... on Project {
            title
          }
        }
      }
      linkToArchive {
        target
        title
        url
      }
    }
    introduction {
      contentIntroduction
      linksIntroduction {
        ... on HomepageIntroductionLinksIntroductionLinkLayoutLayout {
          linkLinksIntroduction {
            target
            title
            url
          }
        }
      }
    }
    experience {
      contentExperience
      linksExperience {
        ... on HomepageExperienceLinksExperienceLinkLayoutLayout {
          linkLinksExperience {
            target
            title
            url
          }
        }
      }
    }
    about {
      contentAbout
      linksAbout {
        ... on HomepageAboutLinksAboutLinkLayoutLayout {
          linkLinksAbout {
            target
            title
            url
          }
        }
      }
    }
  }
}
